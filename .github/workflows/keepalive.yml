name: keepalive

# Пингуем адрес бота на Render каждые ~10 минут, чтобы бесплатный сервис
# не засыпал (иначе бот перестаёт отвечать на /start).
# Публичный репозиторий = безлимитные минуты Actions, так что это бесплатно.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot
        run: |
          echo "Пингую бота..."
          curl -fsS --max-time 90 https://oshka-onboarding-bot.onrender.com/ -o /dev/null \
            && echo "OK — сервис разбужен/жив" \
            || echo "Пинг не удался (сервис мог просыпаться, попробуем в след. раз)"
